server:
  port: 8080
spring:
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen3-max
#          model: qwen3.5-35b-a3b
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024
    vectorstore:
      milvus:
        client:
          host: 127.0.0.1
          port: 19530
#        collection-name: rag_java_demo
#        embedding-dimension: 1024
#        metric-type: COSINE
#        initialize-schema: true
    openai:
      api-key: EMPTY
      base-url: http://localhost:9901
      chat:
        options:
          model: qwen3-medical
          temperature: 0.3
        completions-path: /v1/chat/completions
    chat:
      client:
        enabled: false
  application:
    name: ai-chat-ali
  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 100MB


app:
  upload:
    dir: uploads
  samples:
    dir: samples

medical:
  cnn:
    url: http://localhost:9801/api/pneumonia/predict
    enabled: true
  vllm:
    url: http://localhost:9901/v1/chat/completions
    model: qwen3-0.6b
    enabled: true

tools:
  rag:
    enabled: true          # RagPluggableTool — 内部知识库检索
  websearch:
    enabled: false         # WebSearchPluggableTool — 联网搜索（需要 TAVILY_API_KEY）
  pneumonia:
    enabled: true          # FeiyanPluggableTool — CNN 胸片分析 + 医疗诊断
  medical-diagnosis:
    enabled: false         # MedicalDiagnosisPluggableTool — 纯 vLLM 医疗问诊（与 pneumonia 互斥时可独立启用）

logging:
  level:
    root: INFO
    ff.pro: DEBUG
    org.springframework.ai: DEBUG
jina:
  api-key: ${JINA_API_KEY}

tavily:
  api-key: ${TAVILY_API_KEY}