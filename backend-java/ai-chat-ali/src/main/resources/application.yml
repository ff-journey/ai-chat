server:
  port: ${service.port}

spring:
  main:
    allow-circular-references: true
  ai:
    chat:
      client:
        enabled: false
    openai:
      api-key: ${ai.llm.api-key}
      base-url: ${ai.llm.base-url}
      chat:
        options:
          model: ${ai.llm.model}
          temperature: 0.5
      embedding:
        api-key: ${ai.embedding.api-key}
        options:
          model: ${ai.embedding.model}
        base-url: ${ai.embedding.base-url}
    vectorstore:
      milvus:
        client:
          host: ${vector-store.host}
          port: ${vector-store.port}
          token: ${vector-store.token}
          connect-timeout-ms: 10000
          keep-alive-time-ms: 55000
          keep-alive-timeout-ms: 20000
          idle-timeout-ms: 86400000
          secure: true

  application:
    name: ai-chat-ali
  servlet:
    multipart:
      max-request-size: 100MB
      max-file-size: 100MB


app:
  upload:
    dir: uploads
  samples:
    dir: samples

medical:
  cnn:
    url: ${ai.medical.cnn.url}
    enabled: true
  vllm:
    url: ${ai.medical.model.url}
    model: ${ai.medical.model.name}
    enabled: true

tools:
  rag:
    enabled: true          # RagPluggableTool — 内部知识库检索
  websearch:
    enabled: true         # WebSearchPluggableTool — 联网搜索（需要 TAVILY_API_KEY）
  pneumonia:
    enabled: true          # FeiyanPluggableTool — CNN 胸片分析 + 医疗诊断
  medical-diagnosis:
    enabled: true         # MedicalDiagnosisPluggableTool — 纯 vLLM 医疗问诊（与 pneumonia 互斥时可独立启用）
  rag-agent:
    enabled: true         # RagAgentPluggableTool — 混合检索子 Agent（启用时建议关闭 rag + websearch）
    max-iterations: 5

logging:
  level:
    root: INFO
    ff.pro: DEBUG
    org.springframework.ai: DEBUG
reranker:
  api-key: ${ai.reranker.api-key}
  base-url: ${ai.reranker.base-url}

web-search:
  api-key: ${ai.web-search.api-key}
  base-url: ${ai.web-search.base-url}